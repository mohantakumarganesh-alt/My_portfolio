{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-4 border-bottom border-secondary">
    <h1 class="h2">Student Directory</h1>
    <a href="{% url 'student_add' %}" class="btn btn-sm btn-info text-white"><i class="fas fa-plus"></i> Add Student</a>
</div>

<div class="card bg-dark border-secondary p-4">
    <div class="table-responsive">
        <table class="table table-dark table-striped table-hover align-middle mb-0">
            <thead>
                <tr>
                    <th>Roll No</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Contact</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for student in students %}
                <tr>
                    <td><span class="badge bg-secondary">{{ student.roll_no }}</span></td>
                    <td>{{ student.name }}</td>
                    <td>{{ student.email }}</td>
                    <td>{{ student.contact }}</td>
                    <td>
                        <a href="{% url 'student_edit' student.pk %}" class="btn btn-sm btn-outline-warning"><i class="fas fa-edit"></i></a>
                        <a href="{% url 'student_delete' student.pk %}" class="btn btn-sm btn-outline-danger"><i class="fas fa-trash"></i></a>
                    </td>
                </tr>
                {% empty %}
                <tr><td colspan="5" class="text-center text-muted">No students found.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
