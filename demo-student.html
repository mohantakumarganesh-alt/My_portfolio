<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System | Premium Demo</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Background Shapes */
        .shape {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.4;
        }

        .shape-1 {
            top: -10%;
            left: -10%;
            width: 500px;
            height: 500px;
            background: var(--primary);
        }

        .shape-2 {
            bottom: -10%;
            right: -10%;
            width: 600px;
            height: 600px;
            background: var(--secondary);
        }

        .header {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .back-btn {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .back-btn:hover {
            color: var(--text);
        }

        .container {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 2rem;
            padding: 2rem;
            max-width: 1600px;
            margin: 0 auto;
            height: calc(100vh - 80px);
        }

        /* Glass Card */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .card-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--glass-border);
            font-size: 1.25rem;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
        }

        .form-container {
            padding: 1.5rem;
            overflow-y: auto;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: var(--text);
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        textarea.form-control {
            resize: vertical;
            min-height: 80px;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 1rem;
        }

        .btn {
            padding: 0.75rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }

        .btn-warning {
            background: var(--warning);
            color: #0f172a;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text);
        }

        /* Table Section */
        .table-actions {
            padding: 1rem 1.5rem;
            display: flex;
            gap: 1rem;
            border-bottom: 1px solid var(--glass-border);
        }

        .search-box {
            position: relative;
            flex: 1;
        }

        .search-box i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .search-input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: var(--text);
        }

        .table-container {
            flex: 1;
            overflow: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 1rem 1.5rem;
            color: var(--text-muted);
            font-weight: 500;
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            background: rgba(15, 23, 42, 0.95);
        }

        td {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--glass-border);
            color: var(--text);
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.03);
            cursor: pointer;
        }

        tr.selected {
            background: rgba(99, 102, 241, 0.1);
            border-left: 3px solid var(--primary);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.1);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
                height: auto;
            }

            .glass-card {
                height: auto;
                max-height: 600px;
            }
        }
    </style>
</head>

<body>
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>

    <header class="header">
        <a href="index.html" class="logo">StudentSys<span style="color: var(--secondary)">.</span></a>
        <a href="index.html#projects" class="back-btn">
            <i class="fas fa-arrow-left"></i> Back to Portfolio
        </a>
    </header>

    <div class="container">
        <!-- Manage Form -->
        <div class="glass-card">
            <div class="card-header">
                <span><i class="fas fa-user-edit"></i> Manage Student</span>
            </div>
            <div class="form-container">
                <div class="form-group">
                    <label class="form-label">Roll Number</label>
                    <input type="text" id="roll" class="form-control" placeholder="e.g. 101">
                </div>
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input type="text" id="name" class="form-control" placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label class="form-label">Gender</label>
                    <select id="gender" class="form-control">
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Date of Birth</label>
                    <input type="date" id="dob" class="form-control">
                </div>
                <div class="form-group">
                    <label class="form-label">Contact Number</label>
                    <input type="tel" id="contact" class="form-control" placeholder="123-456-7890">
                </div>
                <div class="form-group">
                    <label class="form-label">Address</label>
                    <textarea id="address" class="form-control" placeholder="Enter full address..."></textarea>
                </div>

                <div class="btn-group">
                    <button class="btn btn-primary" onclick="addStudent()">
                        <i class="fas fa-plus"></i> Add
                    </button>
                    <button class="btn btn-warning" onclick="updateStudent()">
                        <i class="fas fa-pen"></i> Update
                    </button>
                    <button class="btn btn-danger" onclick="deleteStudent()">
                        <i class="fas fa-trash"></i> Delete
                    </button>
                    <button class="btn btn-secondary" onclick="clearForm()">
                        <i class="fas fa-eraser"></i> Clear
                    </button>
                </div>
            </div>
        </div>

        <!-- Data Table -->
        <div class="glass-card">
            <div class="card-header">
                <span><i class="fas fa-list"></i> Student Records</span>
                <span class="badge" id="total-count" style="font-size: 0.9rem; opacity: 0.7;">0 Records</span>
            </div>
            <div class="table-actions">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search" class="search-input"
                        placeholder="Search by Roll No, Name, or Email..." onkeyup="searchStudents()">
                </div>
            </div>
            <div class="table-container">
                <table id="studentTable">
                    <thead>
                        <tr>
                            <th>Roll No</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Gender</th>
                            <th>DOB</th>
                            <th>Contact</th>
                            <th>Address</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Data inserted here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // State Management
        let students = JSON.parse(localStorage.getItem('students')) || [
            { roll: "101", name: "Ganesh Kumar", email: "ganesh@example.com", gender: "Male", dob: "1999-05-15", contact: "9876543210", address: "123 Tech Street, Bangalore" },
            { roll: "102", name: "Sarah Wilson", email: "sarah@example.com", gender: "Female", dob: "2000-08-22", contact: "5556667777", address: "456 Design Ave, Mumbai" }
        ];

        let selectedRowIndex = -1;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderTable(students);
        });

        function saveToLocalStorage() {
            localStorage.setItem('students', JSON.stringify(students));
            updateCount();
        }

        function updateCount() {
            document.getElementById('total-count').innerText = `${students.length} Records`;
        }

        function renderTable(data) {
            const tbody = document.querySelector('#studentTable tbody');
            tbody.innerHTML = '';

            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; padding: 2rem; color: var(--text-muted);">No records found</td></tr>`;
                return;
            }

            data.forEach((s, index) => {
                // Find original index in main array for selection
                const originalIndex = students.indexOf(s);

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><span style="font-weight:600; color: var(--primary);">${s.roll}</span></td>
                    <td>${s.name}</td>
                    <td>${s.email}</td>
                    <td><span style="padding: 2px 8px; border-radius: 4px; background: rgba(255,255,255,0.1); font-size: 0.85rem;">${s.gender}</span></td>
                    <td>${s.dob}</td>
                    <td>${s.contact}</td>
                    <td style="max-width: 150px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${s.address}</td>
                `;

                tr.onclick = () => selectRow(originalIndex);
                if (originalIndex === selectedRowIndex) tr.classList.add('selected');

                tbody.appendChild(tr);
            });
            updateCount();
        }

        function selectRow(index) {
            selectedRowIndex = index;
            const s = students[index];

            document.getElementById('roll').value = s.roll;
            document.getElementById('name').value = s.name;
            document.getElementById('email').value = s.email;
            document.getElementById('gender').value = s.gender;
            document.getElementById('dob').value = s.dob;
            document.getElementById('contact').value = s.contact;
            document.getElementById('address').value = s.address;

            // Re-render to show selection highlight
            searchStudents();
        }

        function getFormData() {
            return {
                roll: document.getElementById('roll').value.trim(),
                name: document.getElementById('name').value.trim(),
                email: document.getElementById('email').value.trim(),
                gender: document.getElementById('gender').value,
                dob: document.getElementById('dob').value,
                contact: document.getElementById('contact').value.trim(),
                address: document.getElementById('address').value.trim()
            };
        }

        function validateForm(data) {
            if (!data.roll || !data.name || !data.email) {
                alert("Roll No, Name, and Email are required fields!");
                return false;
            }
            return true;
        }

        function addStudent() {
            const newStudent = getFormData();

            if (!validateForm(newStudent)) return;

            // Check duplicate Roll No
            if (students.some(s => s.roll === newStudent.roll)) {
                alert("Student with this Roll Number already exists!");
                return;
            }

            students.push(newStudent);
            saveToLocalStorage();
            clearForm();
            searchStudents(); // Refresh table
        }

        function updateStudent() {
            if (selectedRowIndex === -1) {
                alert("Please select a student to update.");
                return;
            }

            const updatedStudent = getFormData();
            if (!validateForm(updatedStudent)) return;

            // Prevent changing Roll No to an existing one (unless it's the same student)
            const existing = students.find((s, i) => s.roll === updatedStudent.roll && i !== selectedRowIndex);
            if (existing) {
                alert("Another student already has this Roll Number!");
                return;
            }

            students[selectedRowIndex] = updatedStudent;
            saveToLocalStorage();
            clearForm();
            searchStudents();
        }

        function deleteStudent() {
            if (selectedRowIndex === -1) {
                alert("Please select a student to delete.");
                return;
            }

            if (confirm("Are you sure you want to delete this record?")) {
                students.splice(selectedRowIndex, 1);
                saveToLocalStorage();
                clearForm();
                searchStudents();
            }
        }

        function clearForm() {
            document.getElementById('roll').value = '';
            document.getElementById('name').value = '';
            document.getElementById('email').value = '';
            document.getElementById('gender').value = 'Male';
            document.getElementById('dob').value = '';
            document.getElementById('contact').value = '';
            document.getElementById('address').value = '';
            selectedRowIndex = -1;

            // Remove selection highlight
            const rows = document.querySelectorAll('tbody tr');
            rows.forEach(r => r.classList.remove('selected'));
        }

        function searchStudents() {
            const searchInput = document.getElementById('search');
            const query = searchInput ? searchInput.value.toLowerCase().trim() : '';

            const filtered = students.filter(s => {
                const roll = (s.roll || '').toLowerCase();
                const name = (s.name || '').toLowerCase();
                const email = (s.email || '').toLowerCase();
                return roll.includes(query) || name.includes(query) || email.includes(query);
            });
            renderTable(filtered);
        }
    </script>
</body>

</html>
