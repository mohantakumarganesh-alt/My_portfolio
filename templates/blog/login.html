{% extends "blog/base.html" %}
{% load crispy_forms_tags %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="content-section border-0 p-5 mt-4">
            <div class="text-center mb-4">
                <i class="bi bi-box-arrow-in-right display-4 text-primary mb-3"></i>
                <h2 class="fw-bold">Welcome Back</h2>
                <p class="text-muted">Please sign in to your account</p>
            </div>
            <form method="POST">
                {% csrf_token %}
                <fieldset class="form-group mb-4">
                    {{ form|crispy }}
                </fieldset>
                <div class="d-grid gap-2">
                    <button class="btn btn-primary btn-lg rounded-pill shadow-sm" type="submit">Log In</button>
                </div>
            </form>
            <div class="text-center pt-4 mt-4 border-top">
                <small class="text-muted">
                    Don't have an account yet? <a class="text-decoration-none fw-bold ms-1" href="{% url 'register' %}">Sign Up Now</a>
                </small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
