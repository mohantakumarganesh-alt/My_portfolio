{% extends "blog/base.html" %}
{% block content %}
    <article class="content-section p-5 mb-4 border-0">
        <header class="mb-5 text-center">
            <div class="d-flex justify-content-center align-items-center mb-3 text-muted small gap-3">
                <span class="d-flex align-items-center">
                    <i class="bi bi-person-circle me-1 fs-5 text-primary"></i>
                    <span class="fw-bold">{{ object.author }}</span>
                </span>
                <span><i class="bi bi-calendar3 me-1"></i>{{ object.created_at|date:"F d, Y" }}</span>
            </div>
            <h1 class="display-5 fw-bold text-dark mb-4">{{ object.title }}</h1>
            
            {% if object.author == user %}
                <div class="d-flex justify-content-center gap-2">
                    <a class="btn btn-outline-primary btn-sm rounded-pill px-3" href="{% url 'post-update' object.id %}">
                        <i class="bi bi-pencil-square me-1"></i>Edit
                    </a>
                    <a class="btn btn-outline-danger btn-sm rounded-pill px-3" href="{% url 'post-delete' object.id %}">
                        <i class="bi bi-trash me-1"></i>Delete
                    </a>
                </div>
            {% endif %}
        </header>
        
        <div class="article-content fs-5" style="line-height: 1.8; color: #374151;">
            {{ object.content|linebreaks }}
        </div>
    </article>
    
    <div class="text-center mt-5 mb-4">
        <a class="btn btn-light rounded-pill px-4 shadow-sm border" href="{% url 'blog-home' %}">
            <i class="bi bi-arrow-left me-2"></i>Back to posts
        </a>
    </div>
{% endblock %}
