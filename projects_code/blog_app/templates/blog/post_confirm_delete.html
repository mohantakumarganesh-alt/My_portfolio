{% extends "base.html" %}

{% block title %}Delete Post - The Developer's Blog{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6 mt-5">
        <div class="glass-form-container text-center">
            <h2 class="mb-4" style="color: #ef4444; font-family: 'Outfit', sans-serif; font-weight: 700;">Delete Post?</h2>
            <p class="mb-4" style="color: #cbd5e1; font-size: 1.1rem;">
                Are you sure you want to delete "<strong>{{ object.title }}</strong>"?<br> This action cannot be undone.
            </p>
            
            <form method="post">
                {% csrf_token %}
                <div class="d-flex gap-3 mt-4">
                    <button type="submit" class="btn btn-danger w-100 py-2">Yes, Delete</button>
                    <a href="{% url 'post_detail' object.pk %}" class="btn btn-outline-secondary w-100 py-2 border-secondary text-light">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
