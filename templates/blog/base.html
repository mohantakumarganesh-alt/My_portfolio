{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Application</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f3f4f6;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --card-bg: rgba(255, 255, 255, 0.95);
        }
        body { 
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color); 
            color: var(--text-main);
            background-image: linear-gradient(rgba(243, 244, 246, 0.8), rgba(243, 244, 246, 0.95)), url('{% static "images/background.jpg" %}');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        
        /* Glassmorphism Navbar */
        .navbar {
            background: rgba(255, 255, 255, 0.8) !important;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(229, 231, 235, 0.5);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            padding: 1rem 0;
            transition: all 0.3s ease;
        }
        .navbar-brand {
            font-weight: 700;
            color: var(--primary-color) !important;
            font-size: 1.5rem;
            letter-spacing: -0.5px;
        }
        .nav-link { 
            color: var(--text-main) !important; 
            font-weight: 500;
            margin: 0 0.5rem;
            border-radius: 0.5rem;
            transition: all 0.2s;
        }
        .nav-link:hover { 
            background-color: rgba(79, 70, 229, 0.1);
            color: var(--primary-color) !important; 
        }
        
        /* Premium Card Styles */
        .content-section { 
            background: var(--card-bg); 
            padding: 2rem; 
            border: 1px solid rgba(255,255,255,0.2); 
            border-radius: 1rem; 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.025);
            margin-bottom: 2rem; 
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        /* Typography refinements */
        h1, h2, h3, h4, h5, h6 { font-weight: 600; letter-spacing: -0.025em; }
        .article-title { color: var(--text-main); text-decoration: none; transition: color 0.2s; }
        .article-title:hover { color: var(--primary-color); }
        .article-content { line-height: 1.7; color: #4b5563; }
        
        /* Buttons */
        .btn-primary {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
            padding: 0.5rem 1.5rem;
            font-weight: 500;
            border-radius: 0.5rem;
            transition: all 0.2s;
        }
        .btn-primary:hover {
            background-color: var(--primary-hover);
            border-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.3);
        }
        
        /* Form inputs */
        .form-control {
            border-radius: 0.5rem;
            padding: 0.75rem 1rem;
            border: 1px solid #d1d5db;
        }
        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
        }
        
        .main-container { padding-top: 2rem; padding-bottom: 4rem; }
    </style>
</head>
<body>
    <header class="site-header sticky-top">
        <nav class="navbar navbar-expand-md navbar-light">
            <div class="container">
                <a class="navbar-brand mr-4" href="{% url 'blog-home' %}">Blog App</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarToggle" aria-controls="navbarToggle" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarToggle">
                    <div class="navbar-nav me-auto">
                        <a class="nav-item nav-link" href="{% url 'blog-home' %}">Home</a>
                    </div>
                    <div class="navbar-nav">
                        {% if user.is_authenticated %}
                            <a class="nav-item nav-link" href="{% url 'post-create' %}"><i class="bi bi-pencil-square me-1"></i>New Post</a>
                            <a class="nav-item nav-link" href="#"><i class="bi bi-person-circle me-1"></i>{{ user.username }}</a>
                            <form method="post" action="{% url 'logout' %}" class="d-inline">
                                {% csrf_token %}
                                <button type="submit" class="btn btn-link nav-item nav-link" style="text-decoration: none; padding: 0.5rem; margin: 0 0.5rem; border: none; box-shadow: none; transform: none;"><i class="bi bi-box-arrow-right me-1"></i>Logout</button>
                            </form>
                        {% else %}
                            <a class="nav-item nav-link" href="{% url 'login' %}">Login</a>
                            <a class="btn btn-primary ms-2 px-4 rounded-pill" style="color: white !important;" href="{% url 'register' %}">Sign Up</a>
                        {% endif %}
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main role="main" class="container main-container">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags }} alert-dismissible fade show">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                    {% endfor %}
                {% endif %}
                
                {% block content %}
                {% endblock %}
            </div>
        </div>
    </main>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
