<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Student SMS Dashboard{% endblock %}</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #0f172a;
            --surface-color: rgba(30, 41, 59, 0.7);
            --accent-color: #38bdf8;
            --text-primary: #f8fafc;
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        .sidebar {
            height: 100vh;
            background: rgba(15, 23, 42, 0.95);
            border-right: 1px solid var(--glass-border);
            position: fixed;
            top: 0;
            left: 0;
            width: 250px;
            padding-top: 2rem;
            z-index: 100;
        }
        .main-content {
            margin-left: 250px;
            padding: 2rem;
            min-height: 100vh;
        }
        .nav-link {
            color: #94a3b8;
            padding: 0.8rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
        }
        .nav-link:hover, .nav-link.active {
            color: var(--accent-color);
            background: rgba(56, 189, 248, 0.1);
            border-left: 3px solid var(--accent-color);
        }
        .stat-card {
            background: var(--surface-color);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
            transition: transform 0.3s;
        }
        .stat-card:hover { font-transform: translateY(-3px); }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="px-4 mb-4">
            <h4 class="fw-bold"><i class="fas fa-user-graduate text-info"></i> SMS <span class="text-info">Web</span></h4>
        </div>
        <ul class="nav flex-column">
            <li class="nav-item">
                <a href="{% url 'dashboard' %}" class="nav-link"><i class="fas fa-desktop"></i> Dashboard</a>
            </li>
            <li class="nav-item">
                <a href="{% url 'student_list' %}" class="nav-link"><i class="fas fa-users"></i> Students</a>
            </li>
            <li class="nav-item">
                <a href="{% url 'student_add' %}" class="nav-link"><i class="fas fa-user-plus"></i> Add Student</a>
            </li>
        </ul>
    </div>

    <div class="main-content">
        {% block content %}{% endblock %}
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
