{% extends "blog/base.html" %}
{% block content %}
    <article class="content-section p-4 mb-4 bg-white shadow-sm rounded">
        <div class="d-flex justify-content-between align-items-center mb-3 article-metadata">
            <a class="text-decoration-none fw-bold text-primary" href="#">{{ object.author }}</a>
            <small class="text-muted">{{ object.created_at|date:"F d, Y" }}</small>
        </div>
        
        {% if object.author == user %}
            <div>
                <a class="btn btn-secondary btn-sm mt-1 mb-3" href="{% url 'post-update' object.id %}">Update</a>
                <a class="btn btn-danger btn-sm mt-1 mb-3" href="{% url 'post-delete' object.id %}">Delete</a>
            </div>
        {% endif %}

        <h1 class="article-title fs-2 border-bottom pb-2">{{ object.title }}</h1>
        <p class="article-content mt-3 fs-5">{{ object.content }}</p>
    </article>
    
    <div class="mt-3">
        <a class="btn btn-outline-primary mb-4" href="{% url 'blog-home' %}">&larr; Back to posts</a>
    </div>
{% endblock %}
