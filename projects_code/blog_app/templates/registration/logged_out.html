{% extends "base.html" %}

{% block title %}Logged Out - The Developer's Blog{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6 mt-5 text-center">
        <div class="glass-form-container">
            <h2 class="mb-3" style="font-family: 'Outfit', sans-serif; font-weight: 700; color: #f8fafc;">You have been successfully logged out</h2>
            <p class="mb-5" style="color: #94a3b8; font-size: 1.1rem;">Thank you for visiting The Developer's Blog!</p>
            
            <div class="d-flex justify-content-center gap-3">
                <a href="{% url 'login' %}" class="btn btn-primary px-4 py-2">Log In Again</a>
                <a href="{% url 'post_list' %}" class="btn btn-outline-secondary px-4 py-2 border-secondary text-light">Go to Home</a>

        </div>
    </div>
</div>
{% endblock %}
